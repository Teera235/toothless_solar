steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-f', 'Dockerfile.weather', '-t', 'gcr.io/$PROJECT_ID/solar-weather-api', '.']
    
  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/solar-weather-api']

images:
  - 'gcr.io/$PROJECT_ID/solar-weather-api'

options:
  machineType: 'E2_HIGHCPU_8'
  
timeout: '900s'